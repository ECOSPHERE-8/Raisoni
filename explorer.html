<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | 3D Eco-Detective</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #064e3b; 
            color: white; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* Top HUD (Heads-Up Display) */
        .game-header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .stat-pill {
            background: rgba(0,0,0,0.8);
            padding: 12px 30px;
            border-radius: 50px;
            border: 2px solid #10b981;
            display: inline-block;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* The 3D Viewing Area */
        model-viewer {
            width: 100vw;
            height: 100vh;
            background: radial-gradient(#1a3917, #064e3b);
        }

        /* Interactive "Hazard" Spots */
        .click-spot {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid white;
            background: #f59e0b; /* Bright Orange */
            cursor: pointer;
            box-shadow: 0 0 20px #f59e0b;
            transition: 0.3s;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .click-spot:hover {
            background: #ffffff;
            transform: scale(1.3);
        }

        /* Bottom Instruction Bar */
        .instruction-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 16px;
            text-align: center;
            width: 80%;
            max-width: 500px;
        }

        .btn-back {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 12px 25px;
            background: white;
            color: #064e3b;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <a href="dashboard.html" class="btn-back">← Back to Dashboard</a>

    <div class="game-header">
        <div class="stat-pill">🔍 Hazards Identified: <span id="count">0</span> / 4</div>
    </div>

    <model-viewer id="world" 
        src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb" 
        camera-controls 
        auto-rotate 
        auto-rotate-delay="1000"
        shadow-intensity="2"
        exposure="1"
        interaction-prompt="auto">

        <button slot="hotspot-plastic" class="click-spot" data-position="0.1m 0.3m 0.1m" onclick="identify('Plastic Pollution', 'Did you know? Plastic takes 450 years to break down. We must recycle it!')"></button>
        <button slot="hotspot-energy" class="click-spot" data-position="-0.1m 0.15m 0.1m" onclick="identify('Energy Waste', 'Leaving lights on wastes power. Switch to LEDs to save energy!')"></button>
        <button slot="hotspot-chemical" class="click-spot" data-position="0m 0.45m -0.1m" onclick="identify('Chemical Leaks', 'Hazardous waste can poison our groundwater. Proper disposal is key.')"></button>
        <button slot="hotspot-carbon" class="click-spot" data-position="0.15m 0.1m -0.2m" onclick="identify('Carbon Emissions', 'Trees absorb CO2. Planting more trees is our best defense against climate change!')"></button>

    </model-viewer>

    

    <div class="instruction-bar">
        🖱️ <strong>Eco-Detective:</strong> Drag your mouse to spin the world. <br>Find and click the orange spots to clean the environment!
    </div>

    <script>
        let foundCount = 0;
        const totalItems = 4;

        function identify(name, fact) {
            // Increment count
            foundCount++;
            document.getElementById('count').innerText = foundCount;
            
            // Hide the clicked hotspot button
            event.target.style.display = 'none';

            // Show educational alert
            alert("🌟 " + name + " Identified!\n\n" + fact);

            // Check if game is over
            if(foundCount === totalItems) {
                setTimeout(() => {
                    alert("🏆 CONGRATULATIONS DETECTIVE!\nYou have identified all environmental hazards. The ecosystem is now protected!");
                    window.location.href = "dashboard.html";
                }, 500);
            }
        }
    </script>
</body>
</html>
