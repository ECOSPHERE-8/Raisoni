<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Eco-Scanner 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #064e3b; 
            color: white; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .stat-overlay {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* 3x3 Grid Layout */
        .matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 95%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            aspect-ratio: 1; 
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
            overflow: hidden; /* Keeps 3D model inside the box */
        }

        .box:hover { transform: scale(1.05); background: white; }
        
        /* State Highlights */
        .box.selected { border-color: #3b82f6; }
        .box.hazard.selected { border-color: #ef4444; }

        /* Final Report Overlay */
        #results-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        .report-card {
            background: white; color: #333; width: 100%; max-width: 600px;
            padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: left;
        }

        .btn-action {
            padding: 12px 30px; border: none; border-radius: 10px;
            cursor: pointer; background: white; color: #064e3b; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="stat-overlay">Hazards: <span id="found">0</span>/4 | Clicks: <span id="chances">0</span>/5</div>
    
    <div class="matrix" id="game-grid"></div>

    <div id="results-overlay">
        <h1 id="final-status-text" style="font-size: 32px; margin-bottom: 10px;">Mission Ended</h1>
        <p id="final-stats" style="color: #d1fae5; margin-bottom: 30px;"></p>
        <div id="report-list"></div>
        <button class="btn-action" onclick="location.reload()">Restart Scanner</button>
        <br>
        <a href="dashboard.html" style="color: white; text-decoration: none;">← Back to Dashboard</a>
    </div>

    <script>
        // Updated with your 3D model placeholders
        const items = [
            { id: 0, name: "Solar Panel", model: "https://path-to-your-model/solar.glb", isHazard: false },
            { id: 1, name: "Car Exhaust", model: "https://path-to-your-model/exhaust.glb", isHazard: true, fact: "Exhaust releases CO2 and pollutants, harming our atmosphere." },
            { id: 2, name: "Oak Tree", model: "https://path-to-your-model/tree.glb", isHazard: false },
            { id: 3, name: "Factory", model: "https://path-to-your-model/factory.glb", isHazard: true, fact: "Factories often release toxic waste into our air and water systems." },
            { id: 4, name: "Eco Bag", model: "https://path-to-your-model/bag.glb", isHazard: false },
            { id: 5, name: "Plastic Bottle", model: "https://path-to-your-model/bottle.glb", isHazard: true, fact: "Plastic takes centuries to decompose and harms wildlife." },
            { id: 6, name: "Recycle Bin", model: "https://path-to-your-model/bin.glb", isHazard: false },
            { id: 7, name: "Coal Mine", model: "https://path-to-your-model/coal.glb", isHazard: true, fact: "Mining destroys land and burning coal is a top source of CO2." },
            { id: 8, name: "Wind Turbine", model: "https://path-to-your-model/turbine.glb", isHazard: false }
        ];

        let foundCount = 0;
        let chancesUsed = 0;
        let foundHazards = [];

        function initGame() {
            const grid = document.getElementById('game-grid');
            items.forEach(item => {
                const box = document.createElement('div');
                box.className = 'box';
                box.id = `box-${item.id}`;
                
                // Embed 3D model viewer into the box
                box.innerHTML = `
                    <model-viewer src="${item.model}" auto-rotate rotation-per-second="30deg" 
                    style="width: 100%; height: 100%; pointer-events: none;"></model-viewer>
                `;

                box.onclick = () => handleChoice(item);
                grid.appendChild(box);
            });
        }

        function handleChoice(item) {
            const box = document.getElementById(`box-${item.id}`);
            if(box.classList.contains('selected')) return;

            chancesUsed++;
            document.getElementById('chances').innerText = chancesUsed;
            box.classList.add('selected');

            if(item.isHazard) {
                foundCount++;
                document.getElementById('found').innerText = foundCount;
                box.classList.add('hazard');
                foundHazards.push(item);
            }

            if(foundCount === 4) endGame(true);
            else if(chancesUsed === 5) endGame(false);
        }

        function endGame(isWin) {
            setTimeout(() => {
                document.getElementById('results-overlay').style.display = 'flex';
                document.getElementById('final-status-text').innerText = isWin ? "SUCCESS 🟢" : "FAILED 🔴";
                document.getElementById('final-stats').innerText = `You identified ${foundCount} / 4 hazards.`;

                let reportHTML = "";
                items.filter(i => i.isHazard).forEach(item => {
                    const status = foundHazards.includes(item) ? "✅ Found" : "❌ Missed";
                    reportHTML += `
                        <div class="report-card">
                            <strong>${item.name}</strong> <span style="float:right">${status}</span><br><br>
                            ${item.fact}
                        </div>`;
                });
                document.getElementById('report-list').innerHTML = reportHTML;
            }, 500);
        }

        window.onload = initGame;
    </script>
</body>
</html>
