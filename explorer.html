<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Eco-Scanner 3D</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #064e3b; 
            color: white; 
            min-height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .stat-overlay {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* 3x3 Matrix Grid */
        .matrix {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 95%;
            max-width: 650px;
            margin-bottom: 20px;
        }

        .box {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            aspect-ratio: 0.85; 
            cursor: pointer;
            transition: 0.3s;
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .box:hover { transform: scale(1.03); background: white; }
        
        /* State Indicators */
        .box.selected { border-color: #3b82f6; }
        .box.hazard.selected { border-color: #ef4444; }

        .item-label {
            color: #333;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Final Results Overlay */
        #results-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.96);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            overflow-y: auto;
        }

        .report-card {
            background: white; color: #333; width: 100%; max-width: 600px;
            padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: left;
        }

        .btn-action {
            padding: 14px 40px; border: none; border-radius: 12px;
            cursor: pointer; background: #10b981; color: white; font-weight: bold;
            font-size: 18px; transition: 0.2s;
        }
        .btn-action:hover { background: #059669; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="stat-overlay">Hazards: <span id="found">0</span>/4 | Clicks: <span id="chances">0</span>/5</div>
    
    <div class="matrix" id="game-grid"></div>

    <div id="results-overlay">
        <h1 id="final-status-text" style="font-size: 36px; margin-bottom: 10px;">End of Scan</h1>
        <p id="final-stats" style="color: #d1fae5; margin-bottom: 30px; font-size: 20px;"></p>
        <div id="report-list" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn-action" onclick="location.reload()">Start New Scan</button>
        <br>
        <a href="dashboard.html" style="color: white; text-decoration: none; border-bottom: 1px solid white;">Return to Dashboard</a>
    </div>

    <script>
        // Your Custom GitHub 3D Models
        const items = [
            { id: 0, name: "Solar Battery", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Solarbattery.glb", isHazard: false },
            { id: 1, name: "Car Exhaust", model: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxInterleaved/glTF-Binary/BoxInterleaved.glb", isHazard: true, fact: "Car exhaust releases pollutants that cause smog and trap heat in our atmosphere." },
            { id: 2, name: "Big Tree", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb", isHazard: false },
            { id: 3, name: "Factory", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Factory.glb", isHazard: true, fact: "Industrial factories are major sources of greenhouse gases and chemical waste." },
            { id: 4, name: "Eco Bag", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bag.glb", isHazard: false },
            { id: 5, name: "Water Bottle", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Waterbottle.glb", isHazard: true, fact: "Plastic bottles contribute to ocean pollution and take 450+ years to decompose." },
            { id: 6, name: "Recycle Bin", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Recycle%20bin.glb", isHazard: false },
            { id: 7, name: "Coal Mine", model: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb", isHazard: true, fact: "Coal mining destroys natural habitats and burning it is the #1 cause of CO2 emissions." },
            { id: 8, name: "Windmill", model: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Windmill.glb", isHazard: false }
        ];

        let foundCount = 0;
        let chancesUsed = 0;
        let foundHazards = [];

        function initGame() {
            const grid = document.getElementById('game-grid');
            items.forEach(item => {
                const box = document.createElement('div');
                box.className = 'box';
                box.id = `box-${item.id}`;
                
                // Set up the 3D viewer for each grid cell
                box.innerHTML = `
                    <model-viewer src="${item.model}" auto-rotate rotation-per-second="40deg" 
                    style="width: 100%; height: 80%; pointer-events: none;"></model-viewer>
                    <div class="item-label">${item.name}</div>
                `;

                box.onclick = () => handleChoice(item);
                grid.appendChild(box);
            });
        }

        function handleChoice(item) {
            const box = document.getElementById(`box-${item.id}`);
            if(box.classList.contains('selected')) return;

            chancesUsed++;
            document.getElementById('chances').innerText = chancesUsed;
            box.classList.add('selected');

            if(item.isHazard) {
                foundCount++;
                document.getElementById('found').innerText = foundCount;
                box.classList.add('hazard');
                foundHazards.push(item);
            }

            // Game end conditions
            if(foundCount === 4) endGame(true);
            else if(chancesUsed === 5) endGame(false);
        }

        function endGame(isWin) {
            setTimeout(() => {
                document.getElementById('results-overlay').style.display = 'flex';
                const status = document.getElementById('final-status-text');
                status.innerText = isWin ? "MISSION SUCCESS 🟢" : "MISSION FAILED 🔴";
                status.style.color = isWin ? "#10b981" : "#ef4444";
                
                document.getElementById('final-stats').innerText = `You identified ${foundCount} out of 4 hazardous items in ${chancesUsed} clicks.`;

                // Display the "Why" report
                let reportHTML = "";
                items.filter(i => i.isHazard).forEach(item => {
                    const resultLabel = foundHazards.includes(item) ? "✅ CORRECT" : "❌ MISSED";
                    reportHTML += `
                        <div class="report-card">
                            <h3 style="margin-bottom:10px;">${item.name} <span style="float:right; font-size:14px;">${resultLabel}</span></h3>
                            <p>${item.fact}</p>
                        </div>`;
                });
                document.getElementById('report-list').innerHTML = reportHTML;
            }, 600);
        }

        window.onload = initGame;
    </script>
</body>
</html>
