<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Vertically centers the content */
            padding: 40px;
            
            /* Background */
            background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                              url('https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* Parallax effect */
            color: white;
        }

        .header { text-align: center; margin-bottom: 50px; }
        h1 { 
            font-size: 3.5rem; 
            color: #10b981; 
            text-shadow: 4px 4px 15px rgba(0,0,0,0.6); 
            font-weight: bold;
            letter-spacing: 2px;
        }
        .header-sub { font-size: 1.2rem; color: #d1fae5; text-shadow: 1px 1px 4px rgba(0,0,0,0.5); }

        /* Main Dashboard (Step 1) */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 950px;
        }

        /* Glassmorphism Buttons */
        .main-btn {
            background: rgba(255, 255, 255, 0.1); /* Transparent glass */
            backdrop-filter: blur(15px); /* Strong blur behind button */
            padding: 50px 20px;
            border-radius: 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .main-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .icon { font-size: 55px; margin-bottom: 15px; display: block; }
        h3 { font-size: 1.6rem; color: #d1fae5; text-shadow: 1px 1px 3px rgba(0,0,0,0.3); }

        /* Game Selection Area (Step 2) */
        #game-selection-area {
            display: none;
            margin-top: 30px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.05); /* Lighter glass for sub-menu */
            backdrop-filter: blur(25px);
            border-radius: 30px;
            width: 100%;
            max-width: 950px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
        }

        .game-choice {
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid #10b981;
            color: #d1fae5;
            padding: 30px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            transition: 0.2s;
            text-align: center;
        }

        .game-choice:hover { background: #10b981; color: #064e3b; transform: scale(1.03); }

        .back-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .back-btn:hover { background: #dc2626; transform: translateX(-5px); }
    </style>
</head>
<body>

    <div class="header">
        <h1>ECO SPHERE</h1>
        <p class="header-sub">Connecting Technology with Nature for a Greener Tomorrow</p>
    </div>

    <div class="menu-container" id="main-menu">
        <a href="learn.html" class="main-btn">
            <span class="icon">📚</span>
            <h3>Learning</h3>
        </a>

        <a href="practice.html" class="main-btn">
            <span class="icon">🧠</span>
            <h3>Practice</h3>
        </a>

        <div class="main-btn" onclick="showGames()">
            <span class="icon">🎮</span>
            <h3>Games</h3>
        </div>

        <a href="about.html" class="main-btn">
            <span class="icon">ℹ️</span>
            <h3>About Us</h3>
        </a>

        <a href="index.html" class="main-btn" style="border-color: #ef4444; color: #ef4444;">
            <span class="icon">🚪</span>
            <h3>Logout</h3>
        </a>
    </div>

    <div id="game-selection-area">
        <button class="back-btn" onclick="hideGames()">← Back to Dashboard</button>
        <h2 style="margin-bottom: 25px; text-align: center; color: white;">Eco-Detective HQ: Choose Your Challenge</h2>
        
        <div class="game-grid">
            <a href="explorer.html" class="game-choice">
                <span style="font-size: 35px; display: block; margin-bottom: 10px;">🔍</span>Eco-Scanner 3D
            </a>

            <a href="catcher.html" class="game-choice">
                <span style="font-size: 35px; display: block; margin-bottom: 10px;">🪣</span>Eco-Catcher (AR)
            </a>

            <a href="#" class="game-choice" style="opacity: 0.4; cursor: not-allowed; border-color: rgba(255,255,255,0.3);">
                <span style="font-size: 35px; display: block; margin-bottom: 10px;">🔒</span>More Games Soon
            </a>
        </div>
    </div>

    <script>
        function showGames() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-selection-area').style.display = 'block';
        }

        function hideGames() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('game-selection-area').style.display = 'none';
        }
    </script>

</body>
</html>
