<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #064e3b;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 { margin-bottom: 40px; font-size: 2.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.2);
            border-color: #10b981;
        }

        .card-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        h3 { font-size: 1.5rem; margin-bottom: 10px; color: #10b981; }
        p { font-size: 0.95rem; color: #d1fae5; line-height: 1.4; }

        .new-badge {
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            position: absolute;
            top: 15px;
            right: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Eco Sphere Game Dashboard</h1>

    <div class="game-container">
        
        <a href="explorer.html" class="game-card">
            <div class="card-icon">🔍</div>
            <h3>Eco-Scanner 3D</h3>
            <p>Scan the 3D matrix and find the hidden environmental hazards.</p>
        </a>

        <a href="catcher.html" class="game-card" style="position: relative;">
            <div class="new-badge">NEW</div>
            <div class="card-icon">🪣</div>
            <h3>Eco-Catcher AR</h3>
            <p>Catch the good items to heal the Earth! Perfect for classroom demos.</p>
        </a>

        <a href="about.html" class="game-card">
            <div class="card-icon">🌿</div>
            <h3>Our Mission</h3>
            <p>Learn more about Eco Sphere and get in touch with our team.</p>
        </a>

    </div>

</body>
</html>
