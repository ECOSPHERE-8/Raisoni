<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | AR Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            
            /* --- THE BACKGROUND IMAGE --- */
            /* Using a light overlay to ensure your text is still easy to read */
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                        url('background.jpg'); /* Ensure this file is in your folder */
            background-size: cover;
            background-position: center;
        }

        .dashboard-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 3.5rem;
            color: #10b981;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            letter-spacing: 2px;
        }

        .welcome-msg {
            color: #333;
            font-size: 1.2rem;
            font-weight: 500;
        }

        /* --- THE CENTRAL EARTH (UP & DOWN ANIMATION) --- */
        .earth-circle {
            width: 320px; /* Adjusted to match your screenshot size */
            height: 320px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #10b981;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
            /* This makes it float at its own place */
            animation: floatUpAndDown 4s ease-in-out infinite;
        }

        @keyframes floatUpAndDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* --- BUTTONS --- */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 650px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.85); /* Light glass effect */
            backdrop-filter: blur(8px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 15px;
            padding: 25px;
            text-decoration: none;
            color: #2d3748;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-card:hover {
            background: #10b981;
            color: white;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header">
            <h1>ECO SPHERE</h1>
            <p class="welcome-msg">Welcome, <b>Prajakta</b>!</p>
        </div>

        <img src="split_earth.png" alt="Eco Earth" class="earth-circle">

        <div class="button-grid">
            <a href="learn.html" class="nav-card">📚 Learn</a>
            <a href="practice.html" class="nav-card">🧠 Practice</a>
            <a href="games.html" class="nav-card">🎮 AR Games</a>
            <a href="about.html" class="nav-card">🌿 About</a>
        </div>

    </div>

</body>
</html>
