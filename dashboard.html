<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Absolute black base */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- THE ANIMATED BACKGROUND (FORCE VISIBLE) --- */
        .master-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Higher than the body black */
            display: flex;
        }

        /* Pollution Side (Left) */
        .left-pollution {
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, #0a0a0a, transparent);
            position: relative;
        }

        /* Rising Fumes Animation */
        .smoke-particle {
            position: absolute;
            bottom: -50px;
            background: rgba(100, 100, 100, 0.3);
            border-radius: 50%;
            filter: blur(40px);
            animation: rise 7s infinite ease-in;
        }

        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-110vh) scale(3); opacity: 0; }
        }

        /* Clean Side (Right) */
        .right-clean {
            width: 50%;
            height: 100%;
            background: linear-gradient(to left, rgba(16, 185, 129, 0.1), transparent);
            position: relative;
        }

        /* Pulsing Vitality Animation */
        .nature-glow {
            position: absolute;
            background: rgba(16, 185, 129, 0.4);
            border-radius: 50%;
            filter: blur(50px);
            animation: breathe 5s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.6); opacity: 0.6; }
        }

        /* --- CONTENT LAYER --- */
        .main-ui {
            position: relative;
            z-index: 10; /* Highest layer */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-top: 40px;
        }

        h1 { font-size: 3rem; color: #10b981; text-shadow: 0 0 20px #10b981; }

        .earth-container {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-earth-circle {
            width: 280px; 
            height: 280px; 
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.5);
            animation: floating 4s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 600px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(16, 185, 129, 0.25);
            border-color: #10b981;
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="master-bg">
        <div class="left-pollution">
            <div class="smoke-particle" style="left: 10%; width: 100px; height: 100px; animation-delay: 0s;"></div>
            <div class="smoke-particle" style="left: 40%; width: 150px; height: 150px; animation-delay: 2s;"></div>
            <div class="smoke-particle" style="left: 25%; width: 120px; height: 120px; animation-delay: 4s;"></div>
        </div>
        <div class="right-clean">
            <div class="nature-glow" style="top: 20%; right: 10%; width: 150px; height: 150px; animation-delay: 0s;"></div>
            <div class="nature-glow" style="top: 60%; right: 20%; width: 100px; height: 100px; animation-delay: 1s;"></div>
            <div class="nature-glow" style="bottom: 10%; right: 40%; width: 180px; height: 180px; animation-delay: 2.5s;"></div>
        </div>
    </div>

    <div class="main-ui">
        <h1>ECO SPHERE</h1>
        <p style="margin-bottom: 20px;">Welcome, <span style="color: #10b981; font-weight: bold;">Prajakta</span>!</p>

        <div class="earth-container">
            <img src="split_earth.png.png" alt="Earth" class="floating-earth-circle">
        </div>

        <div class="menu-grid">
            <a href="learn.html" class="card"><h3>📚 Learn</h3></a>
            <a href="practice.html" class="card"><h3>🧠 Practice</h3></a>
            <a href="games.html" class="card"><h3>🎮 AR Games</h3></a>
            <a href="about.html" class="card"><h3>🌿 About</h3></a>
        </div>
    </div>

</body>
</html>
