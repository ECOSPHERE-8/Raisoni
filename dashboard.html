<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | AR Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050a08; /* Deep dark green/black */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* AR "Scan" Grid Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        .header { margin-top: 30px; text-align: center; z-index: 10; }
        h1 { font-size: 3rem; color: #10b981; text-shadow: 0 0 15px #10b981; }

        /* IMAGE CONTAINER: This makes the image "Move in its own place" */
        .earth-display {
            perspective: 1000px;
            margin: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 350px;
        }

        .floating-earth {
            width: 300px; /* Adjust size based on your image */
            height: auto;
            filter: drop-shadow(0 0 30px rgba(16, 185, 129, 0.6));
            
            /* COMBINED ANIMATION: Floating Up/Down + Subtle Rotation */
            animation: floatUpDown 4s ease-in-out infinite, 
                       tiltRotate 10s linear infinite;
        }

        /* Animation 1: Move Up and Down */
        @keyframes floatUpDown {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* Animation 2: Subtle 3D Tilt (GIS Style) */
        @keyframes tiltRotate {
            0% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            50% { transform: translateY(-30px) rotate(0deg); }
            75% { transform: translateY(-15px) rotate(-5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* Glassmorphism Buttons */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 600px;
            padding-bottom: 50px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        #user-greeting { font-size: 1.2rem; margin-bottom: 20px; color: #d1fae5; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ECO SPHERE</h1>
        <p id="user-greeting">Welcome, <span id="user-name">Explorer</span>!</p>
    </div>

    <div class="earth-display">
        <img src="split_earth.png" alt="Eco Earth" class="floating-earth">
    </div>

    <div class="menu-grid">
        <a href="learn.html" class="card"><h3>📚 Learn</h3></a>
        <a href="practice.html" class="card"><h3>🧠 Practice</h3></a>
        <a href="games.html" class="card"><h3>🎮 AR Games</h3></a>
        <a href="about.html" class="card"><h3>🌿 About</h3></a>
    </div>

    <script>
        // Personalization
        const name = localStorage.getItem('currentUser') || 'Eco-Explorer';
        document.getElementById('user-name').innerText = name;
    </script>
</body>
</html>
