<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            overflow: hidden;
            
            /* --- INTEGRATED BACKGROUND IMAGE --- */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('http://googleusercontent.com/image_collection/image_retrieval/11772822659580785598_0');
            background-size: cover;
            background-position: center;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 40px 20px;
            backdrop-filter: blur(3px);
        }

        .header h1 {
            font-size: 3.5rem;
            color: #10b981;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.8);
            letter-spacing: 2px;
        }

        /* CENTER CIRCULAR EARTH */
        .earth-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 4px solid rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.5);
            object-fit: cover;
            animation: floating 5s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* GLASSMORPHISM BUTTONS */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 600px;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .nav-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            transform: translateY(-5px);
            border-color: #10b981;
        }

        .welcome { font-size: 1.2rem; margin-top: 10px; }
        .name { color: #10b981; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <h1>ECO SPHERE</h1>
            <p class="welcome">Welcome, <span class="name">Prajakta</span>!</p>
        </div>

        <img src="http://googleusercontent.com/image_collection/image_retrieval/11772822659580785598_0" 
             alt="3D Earth" class="earth-circle">

        <div class="menu-grid">
            <a href="learn.html" class="nav-btn"><h3>📚 Learn</h3></a>
            <a href="practice.html" class="nav-btn"><h3>🧠 Practice</h3></a>
            <a href="games.html" class="nav-btn"><h3>🎮 AR Games</h3></a>
            <a href="about.html" class="nav-btn"><h3>🌿 About</h3></a>
        </div>

    </div>

</body>
</html>
