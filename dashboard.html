<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #064e3b;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        h1 { font-size: 2.8rem; color: #10b981; text-shadow: 2px 2px 10px rgba(0,0,0,0.4); }

        /* Container for all buttons */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        /* Standard Button Styling */
        .main-btn {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            cursor: pointer;
        }

        .main-btn:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            transform: translateY(-5px);
        }

        .icon { font-size: 45px; margin-bottom: 15px; display: block; }

        /* Hidden Game Section */
        #game-selection-area {
            display: none; /* Starts hidden */
            margin-top: 30px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 30px;
            width: 100%;
            max-width: 950px;
            border: 2px dashed rgba(255,255,255,0.2);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .game-choice {
            background: white;
            color: #064e3b;
            padding: 20px;
            border-radius: 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.2s;
        }

        .game-choice:hover { background: #d1fae5; transform: scale(1.05); }

        .back-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ECO SPHERE</h1>
        <p>Protecting the planet through technology</p>
    </div>

    <div class="menu-container" id="main-menu">
        <a href="learn.html" class="main-btn">
            <span class="icon">📚</span>
            <h3>Learning</h3>
        </a>

        <a href="practice.html" class="main-btn">
            <span class="icon">🧠</span>
            <h3>Practice</h3>
        </a>

        <div class="main-btn" onclick="showGames()">
            <span class="icon">🎮</span>
            <h3>Games</h3>
        </div>

        <a href="about.html" class="main-btn">
            <span class="icon">ℹ️</span>
            <h3>About Us</h3>
        </a>

        <a href="index.html" class="main-btn" style="border-color: #ef4444;">
            <span class="icon">🚪</span>
            <h3>Logout</h3>
        </a>
    </div>

    <div id="game-selection-area">
        <button class="back-btn" onclick="hideGames()">← Back to Dashboard</button>
        <h2 style="margin-bottom: 20px; text-align: center;">Choose a Challenge:</h2>
        
        <div class="game-grid">
            <a href="explorer.html" class="game-choice">
                <center><span style="font-size: 30px;">🔍</span><br>Eco-Scanner 3D</center>
            </a>

            <a href="catcher.html" class="game-choice">
                <center><span style="font-size: 30px;">🪣</span><br>Eco-Catcher (AR)</center>
            </a>

            <a href="#" class="game-choice" style="opacity: 0.6; cursor: not-allowed;">
                <center><span style="font-size: 30px;">🔜</span><br>Coming Soon...</center>
            </a>
        </div>
    </div>

    <script>
        // Logic to swap the views
        function showGames() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-selection-area').style.display = 'block';
        }

        function hideGames() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('game-selection-area').style.display = 'none';
        }
    </script>

</body>
</html>
