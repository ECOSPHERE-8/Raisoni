<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            
            /* --- LIGHT PROFESSIONAL ENVIRONMENT BACKGROUND --- */
            background: linear-gradient(rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.4)), 
                        url('https://images.unsplash.com/photo-1542601906990-b4d3fb773b09?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        .dashboard-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 3.5rem;
            color: #10b981;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
            letter-spacing: 2px;
        }

        .welcome-msg {
            color: #333;
            font-size: 1.2rem;
            margin-top: 5px;
        }

        /* --- THE CIRCLE EARTH FLOATING ANIMATION --- */
        .earth-circle {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #10b981;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            /* Floats up and down at its own place */
            animation: floatInPlace 4s ease-in-out infinite;
        }

        @keyframes floatInPlace {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        /* --- CLEAN MODERN BUTTONS --- */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 650px;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 18px;
            padding: 25px;
            text-decoration: none;
            color: #2d3748;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .nav-card:hover {
            background: #10b981;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }

        .nav-card h3 { font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="header">
            <h1>ECO SPHERE</h1>
            <p class="welcome-msg">Welcome, <b>Prajakta</b>!</p>
        </div>

        <img src="split_earth.png.png" alt="Eco Earth" class="earth-circle">

        <div class="button-grid">
            <a href="learn.html" class="nav-card"><h3>📚 Learn</h3></a>
            <a href="practice.html" class="nav-card"><h3>🧠 Practice</h3></a>
            <a href="games.html" class="nav-card"><h3>🎮 AR Games</h3></a>
            <a href="about.html" class="nav-card"><h3>🌿 About</h3></a>
        </div>

    </div>

</body>
</html>
