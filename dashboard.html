<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | AR Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #050a08; /* Dark Base */
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* Keeps animations contained */
            position: relative;
        }

        /* --- THE ANIMATED BACKGROUND LAYERS --- */
        
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Behind buttons, but in front of black body */
            display: flex;
        }

        /* Left Side: Polluted Fumes */
        .pollution-side {
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, rgba(50, 50, 50, 0.2), transparent);
            position: relative;
            overflow: hidden;
        }

        .fume {
            position: absolute;
            bottom: -100px;
            width: 150px;
            height: 150px;
            background: rgba(100, 100, 100, 0.2);
            filter: blur(40px);
            border-radius: 50%;
            animation: riseUp 8s infinite ease-in;
        }

        @keyframes riseUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-100vh) scale(2); opacity: 0; }
        }

        /* Right Side: Clean Vitality */
        .clean-side {
            width: 50%;
            height: 100%;
            background: linear-gradient(to left, rgba(16, 185, 129, 0.1), transparent);
            position: relative;
            overflow: hidden;
        }

        .leaf-glow {
            position: absolute;
            width: 100px;
            height: 100px;
            background: rgba(16, 185, 129, 0.3);
            filter: blur(30px);
            border-radius: 50%;
            animation: pulseGlow 5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.2; }
            50% { transform: scale(1.5); opacity: 0.5; }
        }

        /* --- FOREGROUND CONTENT --- */

        .content-wrapper {
            position: relative;
            z-index: 10; /* Above the background */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header { margin-top: 30px; text-align: center; }
        h1 { font-size: 3rem; color: #10b981; text-shadow: 0 0 20px #10b981; }

        .earth-display {
            margin: 30px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .floating-earth-circle {
            width: 300px; 
            height: 300px; 
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.6);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 90%;
            max-width: 600px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
        }
    </style>
</head>
<body>

    <div class="bg-layer">
        <div class="pollution-side">
            <div class="fume" style="left: 10%; animation-delay: 0s;"></div>
            <div class="fume" style="left: 30%; animation-delay: 2s;"></div>
            <div class="fume" style="left: 20%; animation-delay: 4s;"></div>
        </div>
        <div class="clean-side">
            <div class="leaf-glow" style="top: 20%; right: 10%; animation-delay: 0s;"></div>
            <div class="leaf-glow" style="top: 50%; right: 25%; animation-delay: 1.5s;"></div>
            <div class="leaf-glow" style="bottom: 20%; right: 15%; animation-delay: 3s;"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="header">
            <h1>ECO SPHERE</h1>
            <p>Welcome, <span style="color: #10b981; font-weight: bold;">Prajakta</span>!</p>
        </div>

        <div class="earth-display">
            <img src="split_earth.png.png" alt="Eco Earth" class="floating-earth-circle">
        </div>

        <div class="menu-grid">
            <a href="learn.html" class="card"><h3>📚 Learn</h3></a>
            <a href="practice.html" class="card"><h3>🧠 Practice</h3></a>
            <a href="games.html" class="card"><h3>🎮 AR Games</h3></a>
            <a href="about.html" class="card"><h3>🌿 About</h3></a>
        </div>
    </div>

</body>
</html>
