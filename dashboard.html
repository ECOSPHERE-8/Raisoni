<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Sphere | Dashboard</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f0fdf4;
    text-align: center;
    color: #1b4332;
}

.header {
    background: #1b4332;
    color: white;
    padding: 20px;
}

.container {
    padding: 30px;
}

.progress-card, .badge-card {
    background: white;
    max-width: 600px;
    margin: 20px auto;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.1);
}

.badges {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.badge {
    padding: 15px;
    border-radius: 15px;
    background: #e5e7eb;
    width: 120px;
    transition: 0.3s;
}

.badge.unlocked {
    background: #b7e4c7;
    color: #1b4332;
    font-weight: bold;
}

.badge span {
    display: block;
    font-size: 30px;
}

button {
    padding: 12px 25px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    background: #2d6a4f;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="header">
    <h1>🌍 Eco Sphere Dashboard</h1>
    <p>Your Environmental Awareness Journey</p>
</div>

<div class="container">

    <!-- Progress Card -->
    <div class="progress-card">
        <h2>Your Practice Progress</h2>
        <p>You have completed <strong id="completed">0</strong> out of 15 scenarios.</p>
        <button onclick="goPractice()">Continue Practice →</button>
    </div>

    <!-- Badge Section -->
    <div class="badge-card">
        <h2>Your Eco Badges 🏅</h2>
        <div class="badges">
            <div id="b1" class="badge">
                <span>🌱</span>
                Beginner
            </div>
            <div id="b2" class="badge">
                <span>🌿</span>
                Eco Learner
            </div>
            <div id="b3" class="badge">
                <span>🌍</span>
                Eco Master
            </div>
        </div>
    </div>

</div>

<script>
function loadDashboard() {
    let done = parseInt(localStorage.getItem("practiceDone")) || 0;
    document.getElementById("completed").innerText = done;

    // Badge Unlock Logic
    if(done >= 5) {
        document.getElementById("b1").classList.add("unlocked");
    }
    if(done >= 10) {
        document.getElementById("b2").classList.add("unlocked");
    }
    if(done >= 15) {
        document.getElementById("b3").classList.add("unlocked");
    }
}

function goPractice(){
    window.location.href = "practice.html";
}

loadDashboard();
</script>

</body>
</html>
