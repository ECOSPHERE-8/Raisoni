<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoLearn | Welcome</title>
    <style>
        body {
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            /* High-quality nature background from Unsplash */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95); padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3); text-align: center; width: 320px;
            backdrop-filter: blur(10px);
        }
        .logo-img { width: 80px; margin-bottom: 10px; }
        .logo-text { font-size: 28px; font-weight: 800; color: #1b4332; margin: 0; }
        .tagline { font-size: 13px; color: #52b788; margin-bottom: 30px; font-style: italic; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 2px solid #eeeeee; border-radius: 10px; outline: none;
        }
        button {
            width: 100%; padding: 14px; background: #2d6a4f; color: white;
            border: none; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="https://cdn-icons-png.flaticon.com/512/2913/2913520.png" class="logo-img" alt="logo">
        <h1 class="logo-text">ECO-LEARN</h1>
        <div class="tagline">"Where learning meets fun"</div>
        <input type="text" id="username" placeholder="Enter your name..." required>
        <button onclick="saveAndGo()">Start Journey</button>
    </div>

    <script>
        function saveAndGo() {
            const name = document.getElementById('username').value;
            if(name) {
                localStorage.setItem('eco_user', name);
                localStorage.setItem('eco_progress', 0); // Initialize progress
                window.location.href = "dashboard.html";
            } else { alert("Please enter a name!"); }
        }
    </script>
</body>
</html>
