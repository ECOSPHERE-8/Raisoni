<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Practice Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #064e3b; color: white; text-align: center; margin: 0; padding: 20px; }
        .quiz-container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .question-box { margin-bottom: 25px; }
        .options-grid { display: grid; gap: 10px; }
        .option-btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; background: white; color: #333; font-weight: bold; transition: 0.3s; }
        .option-btn:hover { background: #d1fae5; }
        
        /* Clue Box */
        #clue-box { display: none; margin-top: 15px; padding: 15px; background: #b45309; border-radius: 10px; font-style: italic; }

        /* End Screen */
        #results { display: none; flex-direction: column; align-items: center; }
        .review-card { background: white; color: #333; width: 100%; margin-bottom: 10px; padding: 15px; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>Eco Practice Quiz</h1>
        <div id="quiz-zone">
            <p>Question <span id="q-num">1</span> of 15</p>
            <div class="question-box">
                <h2 id="question-text">Loading...</h2>
            </div>
            <div id="options" class="options-grid"></div>
            <div id="clue-box"></div>
        </div>

        <div id="results">
            <h2>Quiz Complete!</h2>
            <div id="final-stats" style="font-size: 24px; margin: 20px 0;"></div>
            <div id="review-list"></div>
            <button class="option-btn" onclick="location.reload()" style="width: 200px; margin-top: 20px;">Try Again</button>
            <br>
            <a href="dashboard.html" style="color: #b7e4c7; text-decoration: none; margin-top: 10px; display: inline-block;">Back to Dashboard</a>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Which bin should a plastic milk bottle go into?", options: ["Blue Bin", "Green Bin"], correct: 0, clue: "Hint: Plastic is a dry, recyclable material." },
            { q: "Is a banana peel considered wet or dry waste?", options: ["Wet", "Dry"], correct: 0, clue: "Hint: If it comes from nature and can rot, it's organic!" },
            { q: "What should you do with an old newspaper?", options: ["Burn it", "Recycle in Blue Bin"], correct: 1, clue: "Hint: Paper is made from trees and can be used again." },
            // ... Add your other 12 questions here following this same format
            { q: "Where does an apple core belong?", options: ["Blue Bin", "Green Bin"], correct: 1, clue: "Hint: Fruit waste can be turned into compost." }
        ];

        let currentQ = 0;
        let score = 0;
        let history = [];

        function loadQuestion() {
            const q = questions[currentQ];
            document.getElementById('q-num').innerText = currentIdx + 1; // Simplified for logic
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('clue-box').style.display = 'none';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            const q = questions[currentQ];
            if (choice === q.correct) {
                score++;
                history.push({ q: q.q, correct: true });
                nextQuestion();
            } else {
                // Show the clue instead of a pop-up
                const clueBox = document.getElementById('clue-box');
                clueBox.innerText = q.clue;
                clueBox.style.display = 'block';
                // Note: We don't advance the question yet, let them choose again!
            }
        }

        function nextQuestion() {
            currentQ++;
            if (currentQ < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-zone').style.display = 'none';
            const resDiv = document.getElementById('results');
            resDiv.style.display = 'flex';
            document.getElementById('final-stats').innerText = `Your Score: ${score}/15`;
        }

        loadQuestion();
    </script>
</body>
</html>
