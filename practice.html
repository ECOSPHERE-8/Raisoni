<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Sphere | Practice</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 20px; text-align: center; color: #1b4332; }
.quiz-card { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
.opt { display: block; width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; cursor: pointer; }
#ar-zone { display: none; margin-top: 20px; }
model-viewer { width: 100%; height: 350px; background-color: #f8fafc; border-radius: 15px; }
</style>
</head>

<body>
<div class="quiz-card">
<h2 id="title">Loading...</h2>
<p id="question"></p>
<div id="options"></div>

<div id="ar-zone">
<h3>🌟 Correct! Reward Unlocked:</h3>
<p id="fact"></p>
<model-viewer id="rv"
    src=""
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="fixed"
    camera-controls
    auto-rotate>
</model-viewer>
<button onclick="next()">Next →</button>
</div>
</div>

<script>
const scenarios=[
{t:"Electricity",q:"Lights on in empty room?",o:["Ignore","Turn off","Do nothing"],c:1,f:"Saving electricity protects Earth!",m:"https://modelviewer.dev/shared-assets/models/Lantern.glb"}
];
let cur=0;

function load(){
const s=scenarios[cur];
title.innerText=s.t;
question.innerText=s.q;
options.innerHTML="";
ar-zone.style.display="none";

s.o.forEach((opt,i)=>{
let b=document.createElement('button');
b.className="opt";
b.innerText=opt;
b.onclick=()=>{
if(i===s.c){
options.style.display="none";
ar-zone.style.display="block";
fact.innerText=s.f;
rv.src=s.m;
}else{alert("Try again 🌱");}
};
options.appendChild(b);
});
}
function next(){window.location.href="dashboard.html";}
load();
</script>
</body>
</html>
