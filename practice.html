<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco Sphere | Practice</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; padding: 20px; text-align: center; color: #1b4332; }
        .quiz-card { max-width: 700px; margin: auto; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .scenario-img { width: 100%; height: 300px; object-fit: cover; border-radius: 15px; margin: 15px 0; border: 3px solid #2d6a4f; }
        .option { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; background: #fff; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .option:hover { background: #dcfce7; border-color: #2d6a4f; }
        /* The AR Reward Box */
        #ar-container { display: none; margin-top: 20px; border-top: 2px dashed #2d6a4f; padding-top: 20px; }
        model-viewer { width: 100%; height: 350px; background-color: #f8fafc; border-radius: 15px; }
        .next-btn { padding: 12px 30px; background: #2d6a4f; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="quiz-card">
        <h2 id="case-title">Loading Scenario...</h2>
        <img id="case-img" src="" class="scenario-img">
        <p id="question-text" style="font-weight: bold; font-size: 18px;"></p>
        
        <div id="options-list">
            </div>

        <div id="ar-container">
            <h3 style="color: #166534;">🌟 Correct! View your AR Reward:</h3>
            <p id="fact-text" style="font-style: italic; color: #374151;"></p>
            <model-viewer id="reward-viewer" 
                src="https://modelviewer.dev/shared-assets/models/Astronaut.glb" 
                ar ar-modes="webxr scene-viewer quick-look" 
                camera-controls auto-rotate shadow-intensity="1">
                <button slot="ar-button" style="background-color: white; border-radius: 4px; border: none; position: absolute; top: 16px; right: 16px; padding: 10px;">
                    👋 View in your Room
                </button>
            </model-viewer>
            <button class="next-btn" onclick="goToNext()">Next Case Study →</button>
        </div>
    </div>

    <script>
        const scenarios = [
            {
                title: "Case Study 1: Saving Electricity",
                q: "You notice lights and fans running in an empty room. Action?",
                img: "https://images.unsplash.com/photo-1473341304170-971dccb5ac1e?auto=format&fit=crop&w=800",
                options: ["Ignore it", "Turn off lights and fans", "Open windows", "Tell friends"],
                correct: 1,
                fact: "Turning off lights saves energy and reduces carbon footprint!",
                model: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/Lantern/glTF/Lantern.gltf"
            },
            {
                title: "Case Study 2: Plastic Bottles",
                q: "What is the best eco-friendly choice for daily water?",
                img: "https://images.unsplash.com/photo-1618591764495-1f95c1481a21?auto=format&fit=crop&w=800",
                options: ["Buy new bottles daily", "Throw bottles away", "Carry reusable steel bottle", "Burn the plastic"],
                correct: 2,
                fact: "A reusable bottle prevents hundreds of plastic bottles from entering oceans!",
                model: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf"
            },
            {
                title: "Case Study 4: Water Wastage",
                q: "While brushing, you see the tap running. What do you do?",
                img: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=800",
                options: ["Let it run", "Close the tap while brushing", "Use more water", "Do nothing"],
                correct: 1,
                fact: "Closing the tap saves up to 8 liters of water per minute!",
                model: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/WaterBottle/glTF/WaterBottle.gltf"
            }
            // You can add all 15 here following this pattern
        ];

        let currentScenario = 0;

        function loadScenario() {
            const data = scenarios[currentScenario];
            document.getElementById('case-title').innerText = data.title;
            document.getElementById('case-img').src = data.img;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('ar-container').style.display = 'none';
            document.getElementById('options-list').style.display = 'block';

            const list = document.getElementById('options-list');
            list.innerHTML = "";
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                list.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const data = scenarios[currentScenario];
            if (index === data.correct) {
                document.getElementById('options-list').style.display = 'none';
                document.getElementById('ar-container').style.display = 'block';
                document.getElementById('fact-text').innerText = data.fact;
                document.getElementById('reward-viewer').src = data.model;
                
                // Update Global Progress
                let prog = parseInt(localStorage.getItem('ecoProg')) || 0;
                localStorage.setItem('ecoProg', Math.min(prog + 7, 100));
            } else {
                alert("Incorrect! Think about what's best for the Earth. 🌍");
            }
        }

        function goToNext() {
            currentScenario++;
            if (currentScenario < scenarios.length) {
                loadScenario();
            } else {
                alert("Amazing! You are an Eco-Champion. Returning to Dashboard.");
                window.location.href = "dashboard.html";
            }
        }

        // Initialize on load
        loadScenario();
    </script>
</body>
</html>
