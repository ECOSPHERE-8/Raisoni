<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Practice</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; padding: 20px; text-align: center; color: #1b4332; }
        .quiz-card { max-width: 650px; margin: auto; background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .scenario-img { width: 100%; height: 280px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; border: 3px solid #2d6a4f; }
        .opt { display: block; width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 10px; background: white; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .opt:hover { background: #dcfce7; border-color: #2d6a4f; }
        #ar-zone { display: none; margin-top: 20px; border-top: 2px dashed #2d6a4f; padding-top: 20px; }
        model-viewer { width: 100%; height: 350px; background-color: #f8fafc; border-radius: 15px; }
        .next-btn { padding: 12px 30px; background: #2d6a4f; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="quiz-card">
    <h2 id="title">Loading...</h2>
    <img id="pic" src="" class="scenario-img">
    <p id="question" style="font-weight: bold;"></p>
    <div id="options"></div>

    <div id="ar-zone">
        <h3 style="color: #166534;">🌟 Correct! Environmental AR View:</h3>
        <p id="fact" style="font-style: italic; color: #4b5563;"></p>
        <model-viewer id="rv" src="" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
            <button slot="ar-button" style="background: white; border: none; border-radius: 5px; padding: 10px; position: absolute; top: 10px; right: 10px;">👋 View in Room</button>
        </model-viewer>
        <button class="next-btn" onclick="next()">Next Lesson →</button>
    </div>
</div>

<script>
const scenarios = [
    {
        t:"Lesson 1: Waste Segregation",
        q:"Click correct dustbin for wet waste.",
        i:"https://images.unsplash.com/photo-1581578731548-c64695cc6952?w=600",
        o:["Dry Waste Bin","Wet Waste Bin","Plastic Only","Metal Only"],
        c:1,
        f:"Segregating waste helps recycling and keeps environment clean.",
        m:"https://modelviewer.dev/shared-assets/models/TrashCan.glb"
    },
    {
        t:"Lesson 2: Plastic Burning Pollution",
        q:"Burning plastic releases harmful gases. Best action?",
        i:"https://images.unsplash.com/photo-1509395176047-4a66953fd231?w=600",
        o:["Burn plastic","Throw anywhere","Recycle properly","Ignore"],
        c:2,
        f:"Burning plastic releases toxic gases harmful to air and health.",
        m:"https://modelviewer.dev/shared-assets/models/RobotExpressive.glb"
    },
    {
        t:"Lesson 3: Seed to Tree Growth",
        q:"What should we do after planting a seed?",
        i:"https://images.unsplash.com/photo-1501004318641-b39e6451bec6?w=600",
        o:["Ignore it","Water regularly","Cut plant","Remove soil"],
        c:1,
        f:"Proper care helps seed grow into plant and then tree.",
        m:"https://modelviewer.dev/shared-assets/models/Tree.glb"
    },
    {
        t:"Lesson 4: Water Wastage",
        q:"Tap left running wastes water. What should you do?",
        i:"https://images.unsplash.com/photo-1584622650111-993a426fbf0a?w=600",
        o:["Leave it","Close the tap","Play with water","Ignore"],
        c:1,
        f:"Saving water protects environment and future resources.",
        m:"https://modelviewer.dev/shared-assets/models/WaterBottle.glb"
    },
    {
        t:"Lesson 5: Transport Pollution",
        q:"Vehicles release harmful gases. Eco-friendly choice?",
        i:"https://images.unsplash.com/photo-1502877338535-766e1452684a?w=600",
        o:["Use public transport","Drive alone daily","Burn fuel","Ignore"],
        c:0,
        f:"Public transport reduces harmful emission gases.",
        m:"https://modelviewer.dev/shared-assets/models/ToyCar.glb"
    },
    {
        t:"Lesson 6: Paper Recycling",
        q:"To save trees, what should we do with paper?",
        i:"https://images.unsplash.com/photo-1519681393784-d120267933ba?w=600",
        o:["Waste paper","Recycle paper","Burn paper","Throw anywhere"],
        c:1,
        f:"Recycling paper saves trees and reduces waste.",
        m:"https://modelviewer.dev/shared-assets/models/Book.glb"
    },
    {
        t:"Lesson 7: Wildlife Protection",
        q:"Buying products made from animal skin is?",
        i:"https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=600",
        o:["Good","Stylish","Harmful","Normal"],
        c:2,
        f:"Protect wildlife. Do not buy products made from animals.",
        m:"https://modelviewer.dev/shared-assets/models/Horse.glb"
    },
    {
        t:"Lesson 8: Avoid Food Wastage",
        q:"What should we do to prevent food waste?",
        i:"https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600",
        o:["Take extra food","Take only required","Throw leftovers","Ignore"],
        c:1,
        f:"Take only required food to reduce wastage and help environment.",
        m:"https://modelviewer.dev/shared-assets/models/FoodCart.glb"
    }
];

let cur = 0;

function load() {
    const s = scenarios[cur];
    document.getElementById('title').innerText = s.t;
    document.getElementById('pic').src = s.i;
    document.getElementById('question').innerText = s.q;
    document.getElementById('ar-zone').style.display = 'none';
    document.getElementById('options').style.display = 'block';

    const div = document.getElementById('options');
    div.innerHTML = "";
    s.o.forEach((opt, idx) => {
        const b = document.createElement('button');
        b.className = "opt";
        b.innerText = opt;
        b.onclick = () => {
            if(idx === s.c) {
                div.style.display = 'none';
                document.getElementById('ar-zone').style.display = 'block';
                document.getElementById('fact').innerText = s.f;
                document.getElementById('rv').src = s.m;
            } else {
                alert("Try again and think environmentally 🌱");
            }
        };
        div.appendChild(b);
    });
}

function next() {
    cur++;
    if(cur < scenarios.length) load();
    else {
        alert("Great job! You completed all environmental AR lessons 🌍");
        window.location.href="dashboard.html";
    }
}

load();
</script>

</body>
</html>
