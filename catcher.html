<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco Sphere | Eco Catcher</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #87CEEB; overflow: hidden; }

        #ui-top {
            position: fixed;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            z-index: 100;
            pointer-events: none;
        }
        .stat-pill {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 50px;
            color: white;
            font-size: 20px;
            border: 2px solid #10b981;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #064e3b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
        }
        .play-btn {
            background: #10b981;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 24px;
            cursor: pointer;
            margin-top: 25px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Eco Catcher</h1>
        <p>Catch the items falling from the sky!</p>
        <button class="play-btn" onclick="startGame()">START MISSION</button>
    </div>

    <div id="ui-top">
        <div class="stat-pill">Score: <span id="score">0</span></div>
        <div class="stat-pill">Health: <span id="health">100%</span></div>
    </div>

    <a-scene vr-mode-ui="enabled: false">
        
        <a-assets timeout="10000">
            <a-asset-item id="model-bucket" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bucket.glb"></a-asset-item>
            <a-asset-item id="model-tree" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb"></a-asset-item>
            <a-asset-item id="model-solar" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Solarbattery.glb"></a-asset-item>
            <a-asset-item id="model-hazard" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb"></a-asset-item>
            <a-asset-item id="model-tire" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb"></a-asset-item>
            <a-asset-item id="model-bag" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bag.glb"></a-asset-item>
        </a-assets>

        <a-entity id="bucket" position="0 0.2 -7" gltf-model="#model-bucket" scale="0.5 0.5 0.5" rotation="0 180 0">
        </a-entity>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 0 -10" rotation="-90 0 0" width="100" height="100" color="#2d5a27"></a-plane>
        
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" position="1 5 1" intensity="1"></a-light>

        <a-camera position="0 2 0" look-controls-enabled="false" wasd-controls-enabled="false"></a-camera>
    </a-scene>

    <script>
        let score = 0;
        let health = 100;
        let active = false;
        const scene = document.querySelector('a-scene');
        const bucket = document.querySelector('#bucket');

        const items = [
            { name: "Tree", model: "#model-tree", hazard: false },
            { name: "Solar", model: "#model-solar", hazard: false },
            { name: "Hazard", model: "#model-hazard", hazard: true },
            { name: "Tire", model: "#model-tire", hazard: true },
            { name: "Eco Bag", model: "#model-bag", hazard: false }
        ];

        // Mouse/Trackpad movement control
        window.addEventListener('mousemove', (e) => {
            if(!active) return;
            // Map mouse to a safe movement range so bucket doesn't fly off screen
            let x = (e.clientX / window.innerWidth) * 12 - 6;
            bucket.setAttribute('position', {x: x, y: 0.2, z: -7});
        });

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            active = true;
            setInterval(spawn, 1000); // Items rain every 1 second
        }

        function spawn() {
            if(!active) return;
            const data = items[Math.floor(Math.random() * items.length)];
            const group = document.createElement('a-entity');
            
            // Spawn items in front of the bucket's Z-lane
            const x = Math.random() * 8 - 4;
            group.setAttribute('position', `${x} 12 -7`);

            const m = document.createElement('a-entity');
            m.setAttribute('gltf-model', data.model);
            m.setAttribute('scale', '0.6 0.6 0.6');
            group.appendChild(m);

            const t = document.createElement('a-text');
            t.setAttribute('value', data.name);
            t.setAttribute('align', 'center');
            t.setAttribute('position', '0 -1.5 0');
            t.setAttribute('color', data.hazard ? '#ff0000' : '#ffffff');
            t.setAttribute('scale', '2 2 2');
            group.appendChild(t);

            scene.appendChild(group);

            let y = 12;
            const fallSpeed = 0.06;

            const timer = setInterval(() => {
                if(!active) return;
                y -= fallSpeed;
                group.setAttribute('position', `${x} ${y} -7`);
                
                let bx = bucket.getAttribute('position').x;
                
                // Collision check (Adjusted for new bucket position)
                if(y < 1.5 && y > 0.3 && Math.abs(x - bx) < 1.2) {
                    if(data.hazard) {
                        health = Math.max(0, health - 10);
                    } else {
                        score += 10;
                    }
                    document.getElementById('score').innerText = score;
                    document.getElementById('health').innerText = health + "%";
                    
                    clearInterval(timer);
                    if(group.parentNode) group.parentNode.removeChild(group);
                }

                if(y < -2) { 
                    clearInterval(timer); 
                    if(group.parentNode) group.parentNode.removeChild(group); 
                }
            }, 20);
        }
    </script>
</body>
</html>
