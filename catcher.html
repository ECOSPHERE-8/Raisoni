<!DOCTYPE html>
<html>
<head>

<title>Eco Sphere - Virtual Cleanup</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:white;
padding:10px;
border-radius:8px;
font-weight:bold;
}

</style>

</head>

<body>

<div id="ui">
Clean the Park: <span id="count">0</span>/3
</div>

<a-scene>

<a-assets>

<a-asset-item id="tree"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb"></a-asset-item>

<a-asset-item id="bottle"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb"></a-asset-item>

<a-asset-item id="tire"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb"></a-asset-item>

<a-asset-item id="barrel"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb"></a-asset-item>

</a-assets>

<!-- Sky -->
<a-sky color="#87CEEB"></a-sky>

<!-- Ground -->
<a-plane
rotation="-90 0 0"
width="30"
height="30"
color="#6ab04c">
</a-plane>

<!-- Trees -->

<a-entity
gltf-model="#tree"
position="-6 0 -6"
scale="1.5 1.5 1.5">
</a-entity>

<a-entity
gltf-model="#tree"
position="6 0 -5"
scale="1.5 1.5 1.5">
</a-entity>

<a-entity
gltf-model="#tree"
position="-5 0 5"
scale="1.5 1.5 1.5">
</a-entity>

<!-- Hazardous Items -->

<a-entity
gltf-model="#bottle"
position="0 0 -2"
scale="0.7 0.7 0.7"
class="trash"
cursor-listener>
</a-entity>

<a-entity
gltf-model="#tire"
position="-2 0 1"
scale="0.8 0.8 0.8"
class="trash"
cursor-listener>
</a-entity>

<a-entity
gltf-model="#barrel"
position="2 0 1"
scale="0.8 0.8 0.8"
class="trash"
cursor-listener>
</a-entity>

<!-- Camera -->

<a-camera position="0 6 10">
<a-cursor></a-cursor>
</a-camera>

</a-scene>

<script>

let cleaned = 0;

AFRAME.registerComponent('cursor-listener', {

init: function () {

this.el.addEventListener('click', () => {

this.el.setAttribute("visible", false);

cleaned++;

document.getElementById("count").innerText = cleaned;

if(cleaned === 3){

setTimeout(()=>{
alert("Great Job! You cleaned the park 🌳");
},500);

}

});

}

});

</script>

</body>
</html>
