<!DOCTYPE html>
<html>
<head>

<title>Eco Sphere - Virtual Cleanup</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:white;
padding:12px;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="ui">
Park Cleanup: <span id="count">0</span>/3
</div>

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<a-assets>

<a-asset-item id="tree"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb"></a-asset-item>

<a-asset-item id="bottle"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb"></a-asset-item>

<a-asset-item id="tire"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb"></a-asset-item>

<a-asset-item id="barrel"
src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb"></a-asset-item>

</a-assets>

<a-marker preset="hiro">

<!-- Ground -->
<a-plane 
rotation="-90 0 0"
width="5"
height="5"
color="#7CFC00">
</a-plane>

<!-- Trees -->
<a-entity 
gltf-model="#tree"
position="-1.5 0 -1"
scale="0.4 0.4 0.4">
</a-entity>

<a-entity 
gltf-model="#tree"
position="1.5 0 -1"
scale="0.4 0.4 0.4">
</a-entity>

<!-- Trash Items -->

<a-entity 
gltf-model="#bottle"
position="0 0 1"
scale="0.4 0.4 0.4"
class="trash"
cursor-listener>
</a-entity>

<a-entity 
gltf-model="#tire"
position="-1 0 0.5"
scale="0.5 0.5 0.5"
class="trash"
cursor-listener>
</a-entity>

<a-entity 
gltf-model="#barrel"
position="1 0 0.5"
scale="0.5 0.5 0.5"
class="trash"
cursor-listener>
</a-entity>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

<script>

let cleaned = 0;

AFRAME.registerComponent('cursor-listener', {
init: function () {

this.el.addEventListener('click', () => {

this.el.setAttribute("visible", false);

cleaned++;

document.getElementById("count").innerText = cleaned;

if(cleaned === 3){
alert("Great Job! The park is clean 🌳");
}

});

}
});

</script>

</body>
</html>
