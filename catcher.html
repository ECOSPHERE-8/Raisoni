<!DOCTYPE html>
<html>
<head>
<title>Eco Sphere – Clean the Park</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
}

#ui{
position:absolute;
top:20px;
left:20px;
background:white;
padding:10px;
border-radius:10px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="ui">
Clean the Park: <span id="count">0</span>/3
</div>

<a-scene cursor="rayOrigin: mouse">

<!-- AUTOMATIC PARK ENVIRONMENT -->

<a-entity environment="
preset: forest;
groundColor: #7BC8A4;
skyType: gradient;
skyColor: #87CEEB;
lighting: point;
dressing: trees;
dressingAmount: 20;
"></a-entity>

<!-- HAZARDOUS ITEMS -->

<a-cylinder
position="-2 0.5 -4"
radius="0.5"
height="1"
color="red"
class="trash">
</a-cylinder>

<a-torus
position="0 0.3 -4"
radius="0.6"
radius-tubular="0.2"
color="black"
class="trash">
</a-torus>

<a-box
position="2 0.5 -4"
depth="1"
height="1"
width="1"
color="orange"
class="trash">
</a-box>

<!-- CAMERA -->

<a-camera position="0 2 4"></a-camera>

</a-scene>

<script>

let cleaned = 0;

document.querySelectorAll(".trash").forEach(item => {

item.addEventListener("click", () => {

item.setAttribute("visible", false);

cleaned++;

document.getElementById("count").innerText = cleaned;

if(cleaned === 3){

setTimeout(()=>{
alert("Great Job! You cleaned the park 🌳");
},500);

}

});

});

</script>

</body>
</html>
