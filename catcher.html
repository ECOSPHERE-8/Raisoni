<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco Sphere | Match & Clean</title>
    <style>
        body { background: #f0fdf4; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; }
        #header { background: #166534; color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        #game-container { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; 
            padding: 20px; max-width: 400px; margin: 40px auto;
        }

        .eco-card {
            background: #ffffff; border: 4px solid #10b981; border-radius: 20px;
            height: 150px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; position: relative; overflow: hidden;
        }

        /* Using your specific model names as labels to ensure they match your GitHub */
        .eco-card img { width: 80%; height: auto; display: none; }
        .eco-card.revealed img { display: block; }
        .eco-card.revealed { background: #f0fdf4; }
        
        #win-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(22, 101, 52, 0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>ECO MATCH</h1>
        <p>Score: <span id="score">0</span> | Found: <span id="found">0</span>/4</p>
    </div>

    <div id="game-container">
        <div class="eco-card" onclick="reveal(this, 50)">
            <span class="label">?</span>
            <img src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb"> </div>

        <div class="eco-card" onclick="reveal(this, 100)">
            <span class="label">?</span>
            <img src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb"> </div>

        <div class="eco-card" onclick="reveal(this, 100)">
            <span class="label">?</span>
            <img src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb"> </div>

        <div class="eco-card" onclick="reveal(this, 100)">
            <span class="label">?</span>
            <img src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb"> </div>
    </div>

    <div id="win-overlay">
        <h2>WELL DONE!</h2>
        <p>You helped identify and clean the environment!</p>
        <button onclick="location.reload()" style="padding: 15px 40px; border-radius: 50px; border: none; background: white; color: #166534; font-weight: bold; cursor: pointer;">Play Again</button>
        <br>
        <a href="dashboard.html" style="color: white; text-decoration: underline;">Back to Dashboard</a>
    </div>

    <script>
        let score = 0;
        let found = 0;

        function reveal(card, points) {
            if (card.classList.contains('revealed')) return;

            card.classList.add('revealed');
            card.querySelector('.label').style.display = 'none';
            
            score += points;
            found += 1;
            
            document.getElementById('score').innerText = score;
            document.getElementById('found').innerText = found;

            if (found === 4) {
                setTimeout(() => {
                    document.getElementById('win-overlay').style.display = 'flex';
                }, 500);
            }
        }
    </script>
</body>
</html>
