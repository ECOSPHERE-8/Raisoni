<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Eco Sphere | Park Rescue</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; overflow: hidden; background-color: #87CEEB; }

        #ui-msg {
            position: fixed;
            top: 25px;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
        }
        .pill {
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 40px;
            border-radius: 50px;
            color: white;
            font-size: 22px;
            border: 2px solid #10b981;
            display: inline-block;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        #success-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 78, 59, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            color: white;
            text-align: center;
        }
        .btn {
            background: #10b981;
            padding: 15px 45px;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            cursor: pointer;
            margin-top: 25px;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="ui-msg">
        <div class="pill">Park Cleanup: Click all 8 Polluting Items!</div>
    </div>

    <div id="success-screen">
        <h1 style="font-size: 4rem; color: #10b981;">MISSION COMPLETE!</h1>
        <p style="font-size: 1.8rem; margin: 20px 0;">The park is safe for the animals and plants again!</p>
        <button onclick="location.reload()" class="btn">Clean Again</button>
        <a href="dashboard.html" class="btn" style="background: #3b82f6; margin-left: 10px;">Back to Home</a>
    </div>

    <a-scene cursor="fuse: false; rayOrigin: mouse">
        <a-assets timeout="15000">
            <a-asset-item id="m-tree" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb"></a-asset-item>
            <a-asset-item id="m-cow" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cow.glb"></a-asset-item>
            <a-asset-item id="m-apple" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Apple.glb"></a-asset-item>
            <a-asset-item id="m-pineapple" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Pineapple.glb"></a-asset-item>
            
            <a-asset-item id="m-hazard" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb"></a-asset-item>
            <a-asset-item id="m-tire" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb"></a-asset-item>
            <a-asset-item id="m-can" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb"></a-asset-item>
            <a-asset-item id="m-box" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cardboard_Box.glb"></a-asset-item>
            <a-asset-item id="m-deadtree" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Dead%20Trees.glb"></a-asset-item>
            <a-asset-item id="m-factory" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Factory.glb"></a-asset-item>
            <a-asset-item id="m-germ" src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Human%20Immunodeficiency%20Virus....glb"></a-asset-item>
        </a-assets>

        <a-sky color="#87CEEB"></a-sky>
        <a-plane position="0 0 -10" rotation="-90 0 0" width="100" height="100" color="#2d5a27"></a-plane>
        
        <a-entity gltf-model="#m-tree" position="-10 0 -15" scale="1.2 1.2 1.2"></a-entity>
        <a-entity gltf-model="#m-cow" position="5 0 -13" rotation="0 -30 0" scale="2 2 2"></a-entity>
        <a-entity gltf-model="#m-apple" position="-4 0.5 -8" scale="2 2 2"></a-entity>
        <a-entity gltf-model="#m-pineapple" position="8 0.2 -10" scale="2 2 2"></a-entity>

        <a-entity class="cleanable" gltf-model="#m-factory" position="0 0 -20" scale="0.05 0.05 0.05" onclick="cleanItem(this)"></a-entity>
        
        <a-entity class="cleanable" gltf-model="#m-deadtree" position="-7 0 -10" scale="0.5 0.5 0.5" onclick="cleanItem(this)"></a-entity>
        <a-entity class="cleanable" gltf-model="#m-deadtree" position="6 0 -7" scale="0.4 0.4 0.4" onclick="cleanItem(this)"></a-entity>

        <a-entity class="cleanable" gltf-model="#m-germ" position="0 2 -8" scale="0.1 0.1 0.1" onclick="cleanItem(this)"></a-entity>

        <a-entity class="cleanable" gltf-model="#m-hazard" position="-3 0 -6" scale="0.4 0.4 0.4" onclick="cleanItem(this)"></a-entity>
        <a-entity class="cleanable" gltf-model="#m-tire" position="3 0 -5" scale="0.6 0.6 0.6" onclick="cleanItem(this)"></a-entity>
        <a-entity class="cleanable" gltf-model="#m-can" position="1 0 -4" scale="1.2 1.2 1.2" onclick="cleanItem(this)"></a-entity>
        <a-entity class="cleanable" gltf-model="#m-box" position="-5 0 -12" scale="1 1 1" onclick="cleanItem(this)"></a-entity>

        <a-light type="ambient" intensity="0.9"></a-light>
        <a-light type="directional" position="1 10 1" intensity="1"></a-light>
        <a-camera position="0 3 6" look-controls></a-camera>
    </a-scene>

    <script>
        let counter = 8;

        function cleanItem(el) {
            // Animated exit
            el.setAttribute('animation', 'property: scale; to: 0 0 0; dur: 500; easing: easeInElastic');
            
            setTimeout(() => {
                if(el.parentNode) {
                    el.parentNode.removeChild(el);
                    counter--;
                    if (counter === 0) {
                        document.getElementById('success-screen').style.display = 'flex';
                    }
                }
            }, 500);
        }
    </script>
</body>
</html>
