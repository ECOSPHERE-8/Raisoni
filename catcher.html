<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | 3D Touch</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>
    <style>
        body { background: #e8f5e9; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; max-width: 500px; margin: 20px auto; }

        .card {
            background: white; border: 3px solid #10b981; border-radius: 20px;
            height: 200px; overflow: hidden; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Styling the 3D viewer to fit the box perfectly */
        model-viewer {
            width: 100%; height: 100%;
            --poster-color: transparent;
        }

        .label {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(16, 185, 129, 0.8); color: white;
            font-weight: bold; padding: 5px 0; font-size: 14px;
        }
    </style>
</head>
<body>

    <h2 style="color: #2e7d32;">Touch & Rotate the Objects!</h2>

    <div class="grid">
        <div class="card">
            <model-viewer src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/BigTree.glb" 
                auto-rotate camera-controls touch-action="pan-y">
            </model-viewer>
            <div class="label">Tree</div>
        </div>

        <div class="card">
            <model-viewer src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tires.glb" 
                auto-rotate camera-controls touch-action="pan-y">
            </model-viewer>
            <div class="label">Hazard: Tire</div>
        </div>

        <div class="card">
            <model-viewer src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/chemical-barrel.glb" 
                auto-rotate camera-controls touch-action="pan-y">
            </model-viewer>
            <div class="label">Hazard: Barrel</div>
        </div>

        <div class="card">
            <model-viewer src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb" 
                auto-rotate camera-controls touch-action="pan-y">
            </model-viewer>
            <div class="label">Trash: Bottle</div>
        </div>
    </div>

    <p style="color: #666;">Drag your finger to rotate. Pinch to zoom!</p>

</body>
</html>
