<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | Eco Warrior AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #064e3b; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .stats { display: flex; justify-content: space-around; font-size: 18px; font-weight: bold; margin-bottom: 15px; background: #065f46; padding: 10px; border-radius: 10px; }
        model-viewer { width: 100%; height: 350px; background: #ffffff; border-radius: 15px; margin-bottom: 15px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .blue { background: #2563eb; color: white; }
        .green { background: #16a34a; color: white; }
        #over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; overflow-y: auto; z-index: 10; padding: 40px 20px; }
        .review-card { background: white; color: #333; width: 100%; max-width: 500px; padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; border-left: 8px solid #ef4444; }
        .review-card.correct { border-left-color: #10b981; }
        .final-score-text { font-size: 28px; margin-bottom: 20px; color: #fbbf24; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Eco Warrior Games</h1>
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">60</span>s</div>
            <div>Item: <span id="current-num">1</span>/11</div>
        </div>

        <div id="game-zone">
            <h3 id="instruction">Sort the Waterbottle!</h3>
            <model-viewer id="obj" 
                src="https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Waterbottle.glb" 
                ar ar-modes="webxr scene-viewer quick-look" 
                camera-controls auto-rotate shadow-intensity="1">
                <button slot="ar-button" style="background: white; border: none; border-radius: 5px; padding: 8px; position: absolute; top: 10px; right: 10px;">View in AR</button>
            </model-viewer>
            
            <div class="btn-grid">
                <button class="game-btn blue" onclick="check('dry')">BLUE BIN (Recycle)</button>
                <button class="game-btn green" onclick="check('wet')">GREEN BIN (Organic)</button>
            </div>
        </div>
    </div>

    <div id="over">
        <h1 id="final-status">Game Complete!</h1>
        <div id="final-score-display" class="final-score-text"></div>
        <div id="review-list"></div>
        <button class="game-btn" style="background: white; color: black; margin: 20px 0; padding: 10px 40px;" onclick="location.reload()">Try Again</button>
        <br>
        <a href="dashboard.html" style="color: #b7e4c7; text-decoration: none;">Return to Dashboard</a>
    </div>

    <script>
        const items = [
            // Original 3
            { name: "Waterbottle", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Waterbottle.glb", info: "Plastic takes centuries to break down. Recycling it keeps our oceans clean!" },
            { name: "Pineapple", type: "wet", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Pineapple.glb", info: "Fruit waste is a natural fertilizer that helps plants grow." },
            { name: "LightDesk", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/LightDesk.glb", info: "Furniture materials like wood and metal should be reused." },

            // Your Uploads
            { name: "Bannana", type: "wet", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bannana.glb", info: "Organic peels are 100% biodegradable and great for compost." },
            { name: "Smashed Glass", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Smashed_Glass.glb", info: "Glass can be recycled endlessly without losing quality." },
            { name: "Shoes", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Shoes.glb", info: "Footwear often contains rubber and synthetic fabrics for recycling." },
            { name: "Cardboard Box", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cardboard_Box.glb", info: "Recycled cardboard reduces the need to cut down more trees." },
            { name: "Cola Can", type: "dry", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cola_Can.glb", info: "Aluminum recycling saves 95% of the energy needed to make new cans!" },
            { name: "Apple", type: "wet", m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Apple.glb", info: "Apple cores decompose naturally and belong in the wet waste." },

            // Additional 2 Items
            { name: "Safety Helmet", type: "dry", m: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb", info: "Industrial plastic waste is a dry recyclable material." },
            { name: "Avocado", type: "wet", m: "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb", info: "Seeds and fruit skins are biological organic matter." }
        ];

        let score = 0;
        let timeLeft = 60; 
        let currentIdx = 0;
        let gameHistory = []; 

        const timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) endGame(); 
        }, 1000);

        function check(choice) {
            const isCorrect = (choice === items[currentIdx].type);
            if(isCorrect) score += 10;
            
            gameHistory.push({ item: items[currentIdx], userCorrect: isCorrect });

            currentIdx++;
            if (currentIdx < items.length) {
                document.getElementById('obj').src = items[currentIdx].m;
                document.getElementById('instruction').innerText = "Sort the " + items[currentIdx].name + "!";
                document.getElementById('current-num').innerText = currentIdx + 1;
                document.getElementById('score').innerText = score;
            } else {
                endGame();
            }
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('over').style.display = 'flex';
            document.getElementById('final-score-display').innerText = "Final Score: " + score;
            
            const statusMsg = (currentIdx === items.length) 
                ? "Hurray! You have learned a lot today! 🌍✨" 
                : "Nice try! Let's learn more and try again! 💪♻️";
            document.getElementById('final-status').innerText = statusMsg;

            let reviewHTML = "";
            gameHistory.forEach(entry => {
                const cardClass = entry.userCorrect ? "correct" : "";
                const symbol = entry.userCorrect ? "✅" : "❌";
                reviewHTML += `
                    <div class="review-card ${cardClass}">
                        <strong>${symbol} ${entry.item.name}</strong><br>
                        <em>Fact:</em> ${entry.item.info}
                    </div>
                `;
            });
            document.getElementById('review-list').innerHTML = reviewHTML;
        }
    </script>
</body>
</html>
