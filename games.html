<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Sphere | AR Games</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #064e3b; color: white; text-align: center; margin: 0; padding: 20px; }
        .game-container { max-width: 600px; margin: auto; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .stats { display: flex; justify-content: space-around; font-size: 20px; font-weight: bold; margin-bottom: 15px; background: #065f46; padding: 10px; border-radius: 10px; }
        
        /* Fixed height to prevent the "White Blank" issue */
        model-viewer { width: 100%; height: 400px; background: #ffffff; border-radius: 15px; margin-bottom: 15px; --poster-color: transparent; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-btn { padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .blue { background: #2563eb; color: white; }
        .green { background: #16a34a; color: white; }
        #over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Eco Warrior Games</h1>
        
        <div class="stats">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="timer">30</span>s</div>
        </div>

        <div id="game-zone">
            <h3 id="instruction">Sort this item to help the forest grow!</h3>
            
            <model-viewer id="obj" src="https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/WaterBottle/glTF/WaterBottle.gltf" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
                <button slot="ar-button" style="background: white; border: none; border-radius: 5px; padding: 8px; position: absolute; top: 10px; right: 10px;">Place in Room</button>
            </model-viewer>
            
            <div class="btn-grid">
                <button class="game-btn blue" onclick="check('dry')">BLUE BIN (Recyclable)</button>
                <button class="game-btn green" onclick="check('wet')">GREEN BIN (Organic)</button>
            </div>
            <p style="margin-top: 15px; font-style: italic; font-size: 14px;">Hint: Blue = Plastic/Paper | Green = Seeds/Food</p>
        </div>
    </div>

    <div id="over">
        <h1>Time's Up!</h1>
        <h2 id="final-score">Score: 0</h2>
        <p id="msg"></p>
        <button class="game-btn" style="background: white; color: black; padding: 10px 30px;" onclick="location.reload()">Try Again</button>
        <br>
        <a href="dashboard.html" style="color: #b7e4c7; text-decoration: none; margin-top: 20px;">Back to Dashboard</a>
    </div>

    <script>
        const items = [
            { name: "Water Bottle", type: "dry", m: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/WaterBottle/glTF/WaterBottle.gltf" },
            { name: "Crumpled Paper", type: "dry", m: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/MaterialsVariantsShoe/glTF/MaterialsVariantsShoe.gltf" },
            { name: "Planting Seeds", type: "wet", m: "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/Lantern/glTF/Lantern.gltf" }
        ];

        // The "Forest" Reward Model
        const treeModel = "https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/Models/PineTree/glTF/PineTree.gltf";

        let score = 0;
        let timeLeft = 30;
        let currentItem = 0;

        const timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 0) endGame();
        }, 1000);

        function check(choice) {
            if(choice === items[currentItem].type) {
                score += 10;
                document.getElementById('score').innerText = score;
                
                // REFORESTATION LOGIC: If score hits 30, show the tree!
                if(score >= 30) {
                    document.getElementById('instruction').innerText = "Look! The environment is recovering! 🌳";
                    document.getElementById('obj').src = treeModel;
                    // Reset to next item after 2 seconds so they can keep playing
                    setTimeout(nextItem, 2000); 
                } else {
                    nextItem();
                }
            } else {
                alert("Wrong bin! That hurts the environment. 🌍");
                timeLeft -= 3; 
            }
        }

        function nextItem() {
            currentItem = Math.floor(Math.random() * items.length);
            document.getElementById('obj').src = items[currentItem].m;
            document.getElementById('instruction').innerText = "Sort this " + items[currentItem].name + "!";
        }

        function endGame() {
            clearInterval(timerId);
            localStorage.setItem("ecoHighScore", score); // Saves score for dashboard
            document.getElementById('over').style.display = 'flex';
            document.getElementById('final-score').innerText = "Final Score: " + score;
            document.getElementById('msg').innerText = score >= 30 ? "You're an Eco Master! 🌍" : "Keep practicing to save the forest!";
        }
    </script>
</body>
</html>
