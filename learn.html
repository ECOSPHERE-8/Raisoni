<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eco Sphere | AR Learning</title>

<!-- Stable Model Viewer CDN -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body { display: flex; margin: 0; font-family: sans-serif; background: #f0fdf4; height: 100vh; }
.sidebar { width: 300px; background: #1b4332; color: white; padding: 20px; }
.lesson-btn { width: 100%; padding: 12px; margin: 8px 0; background: #2d6a4f; color: white; border: none; border-radius: 8px; cursor: pointer; }
.viewer { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
model-viewer { width: 80%; height: 60vh; background: white; border-radius: 20px; }
.info { background: white; padding: 20px; margin-top: 20px; border-radius: 15px; text-align: center; }
</style>
</head>

<body>

<div class="sidebar">
<h2>AR Lessons</h2>
<button class="lesson-btn" onclick="updateLesson(1)">Waste Bins</button>
<button class="lesson-btn" onclick="updateLesson(2)">Air Pollution</button>
<button class="lesson-btn" onclick="updateLesson(3)">Seed to Tree</button>
<button class="lesson-btn" onclick="updateLesson(4)">Water Waste</button>
<button class="lesson-btn" onclick="updateLesson(5)">Transport Gases</button>
<button class="lesson-btn" onclick="updateLesson(6)">Paper Recycling</button>
<button class="lesson-btn" onclick="updateLesson(7)">Wildlife Care</button>
<button class="lesson-btn" onclick="updateLesson(8)">Food Waste</button>
<a href="dashboard.html" style="color:white">← Back</a>
</div>

<div class="viewer">
<model-viewer id="mv" src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate shadow-intensity="1">
<button slot="ar-button" style="padding:10px;border:none;border-radius:8px;background:white;">View in Room 🌍</button>
</model-viewer>

<div class="info">
<h2 id="title">Waste Management</h2>
<p id="desc">Click lessons to explore environmental awareness in AR.</p>
</div>
</div>

<script>
const lessons={
1:{t:"Waste Bins",d:"Sort waste: Green for organic, Blue for recyclables.",m:"https://modelviewer.dev/shared-assets/models/WaterBottle.glb"},
2:{t:"Air Pollution",d:"Burning plastic releases harmful gases.",m:"https://modelviewer.dev/shared-assets/models/Lantern.glb"},
3:{t:"Seed to Tree",d:"Plant trees to produce oxygen and balance nature.",m:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"},
4:{t:"Water Waste",d:"Closing taps saves thousands of litres yearly.",m:"https://modelviewer.dev/shared-assets/models/WaterBottle.glb"},
5:{t:"Transport Gases",d:"Public transport reduces pollution.",m:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"},
6:{t:"Paper Recycling",d:"Recycling paper saves trees.",m:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"},
7:{t:"Wildlife Care",d:"Protect animals to preserve ecosystem balance.",m:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"},
8:{t:"Food Waste",d:"Avoid wasting food to save energy and water.",m:"https://modelviewer.dev/shared-assets/models/Astronaut.glb"}
};

function updateLesson(id){
const l=lessons[id];
document.getElementById('title').innerText=l.t;
document.getElementById('desc').innerText=l.d;
document.getElementById('mv').src=l.m;
let p=parseInt(localStorage.getItem('ecoProg'))||0;
localStorage.setItem('ecoProg',Math.min(p+5,100));
}
</script>

</body>
</html>
