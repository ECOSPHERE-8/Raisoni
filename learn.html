<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eco Sphere | AR Learning</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    display: flex;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e6f9f0, #f0fdf4);
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #1b4332;
    color: white;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 2px 0 10px rgba(0,0,0,0.1);
}

.sidebar h2 {
    margin-top: 0;
    text-align: center;
    letter-spacing: 1px;
}

.lesson-btn {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #2d6a4f;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 15px;
}

.lesson-btn:hover {
    background: #40916c;
    transform: scale(1.02);
}

/* Viewer */
.viewer {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

model-viewer {
    width: 80%;
    height: 55vh;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* Info Card */
.info {
    background: white;
    padding: 22px;
    margin-top: 20px;
    border-radius: 18px;
    text-align: center;
    max-width: 620px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.info h2 {
    margin-bottom: 10px;
    color: #1b4332;
}

.info p {
    font-size: 16px;
    color: #333;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>AR Lessons 🌱</h2>
    <button class="lesson-btn" onclick="updateLesson(1)">Waste Bins</button>
    <button class="lesson-btn" onclick="updateLesson(2)">Air Pollution</button>
    <button class="lesson-btn" onclick="updateLesson(3)">Afforestation</button>
    <button class="lesson-btn" onclick="updateLesson(4)">Deforestation</button>
    <button class="lesson-btn" onclick="updateLesson(5)">Water Waste</button>
    <button class="lesson-btn" onclick="updateLesson(6)">Transport</button>
    <button class="lesson-btn" onclick="updateLesson(7)">Recycling Bin</button>
    <button class="lesson-btn" onclick="updateLesson(8)">Wildlife Care</button>
    <button class="lesson-btn" onclick="updateLesson(9)">Food Waste</button>
    <button class="lesson-btn" onclick="updateLesson(10)">Dustbin</button>
    <button class="lesson-btn" onclick="updateLesson(11)">Factory Waste</button>
    <button class="lesson-btn" onclick="updateLesson(12)">Disease</button>
    <a href="dashboard.html" style="color:white;display:block;margin-top:20px;text-align:center;">← Back to Dashboard</a>
</div>

<div class="viewer">
    <model-viewer id="mv"
        src="https://modelviewer.dev/shared-assets/models/WaterBottle.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1">
        <button slot="ar-button"
            style="padding:10px 16px;border:none;border-radius:10px;background:#1b4332;color:white;font-weight:bold;">
            🌍 View in Your Room
        </button>
    </model-viewer>

    <div class="info">
        <h2 id="title">Waste Management</h2>
        <p id="desc">Click lessons to explore environmental awareness in AR.</p>
    </div>
</div>

<script>
const lessons = {
1: {
    t: "Waste Bins",
    d: "Use green bins for organic waste and blue bins for recyclable materials.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Planet%20(1).glb"
},
2: {
    t: "Air Pollution",
    d: "Burning plastic releases toxic gases that harm health and the atmosphere.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Campfire.glb"
},
3: {
    t: "Afforestation",
    d: "Planting trees increases oxygen levels and helps restore ecological balance.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tree.glb"
},
4: {
    t: "Deforestation",
    d: "Cutting trees disturbs climate balance and destroys wildlife habitats.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Dead%20Trees.glb"
},
5: {
    t: "Water Waste",
    d: "Closing taps and fixing leaks can save thousands of litres of water yearly.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Waterfall.glb"
},
6: {
    t: "Transport",
    d: "Using public transport reduces fuel consumption and lowers air pollution.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bike.glb"
},
7: {
    t: "Recycling Bin",
    d: "Recycling helps save trees, water, and energy used in production.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Recycle%20bin.glb"
},
8: {
    t: "Wildlife Care",
    d: "Protecting animals helps maintain the balance of the ecosystem.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cow.glb"
},
9: {
    t: "Food Waste",
    d: "Avoid wasting food — it saves natural resources and reduces landfill pollution.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/food.glb"
},
10: {
    t: "Dustbin",
    d: "Proper waste segregation keeps the environment clean and healthy.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Trashcan.glb"
},
11: {
    t: "Factory Waste",
    d: "Industrial waste must be treated properly to avoid harming nature.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/trash.glb"
},
12: {
    t: "Disease",
    d: "Poor waste management can spread harmful diseases and viruses.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Human%20Immunodeficiency%20Virus.glb"
}
};

function updateLesson(id) {
    const lesson = lessons[id];
    document.getElementById('title').innerText = lesson.t;
    document.getElementById('desc').innerText = lesson.d;
    document.getElementById('mv').src = lesson.m;

    let progress = parseInt(localStorage.getItem('ecoProg')) || 0;
    localStorage.setItem('ecoProg', Math.min(progress + 5, 100));
}
</script>

</body>
</html>
