<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eco Sphere | AR Learning</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body {
    display: flex;
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e6f9f0, #f0fdf4);
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 280px;
    background: #1b4332;
    color: white;
    padding: 20px;
    overflow-y: auto;
    box-shadow: 2px 0 10px rgba(0,0,0,0.1);
}

.sidebar h2 {
    margin-top: 0;
    text-align: center;
    letter-spacing: 1px;
}

.lesson-btn {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    background: #2d6a4f;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-size: 15px;
}

.lesson-btn:hover {
    background: #40916c;
    transform: scale(1.02);
}

/* Viewer */
.viewer {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

model-viewer {
    width: 80%;
    height: 55vh;
    background: white;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* Info Card */
.info {
    background: white;
    padding: 22px;
    margin-top: 20px;
    border-radius: 18px;
    text-align: center;
    max-width: 620px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.info h2 {
    margin-bottom: 10px;
    color: #1b4332;
}

.info p {
    font-size: 16px;
    color: #333;
    line-height: 1.5;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>AR Lessons 🌱</h2>
    <button class="lesson-btn" onclick="updateLesson(1)">Earth</button>
    <button class="lesson-btn" onclick="updateLesson(2)">Air Pollution</button>
    <button class="lesson-btn" onclick="updateLesson(3)">Afforestation</button>
    <button class="lesson-btn" onclick="updateLesson(4)">Deforestation</button>
    <button class="lesson-btn" onclick="updateLesson(5)">Water Waste</button>
    <button class="lesson-btn" onclick="updateLesson(6)">Transport</button>
    <button class="lesson-btn" onclick="updateLesson(7)">Recycling Bin</button>
    <button class="lesson-btn" onclick="updateLesson(8)">Wildlife Care</button>
    <button class="lesson-btn" onclick="updateLesson(9)">Food Waste</button>
    <button class="lesson-btn" onclick="updateLesson(10)">Dustbin</button>
    <button class="lesson-btn" onclick="updateLesson(11)">Factory Waste</button>
    <button class="lesson-btn" onclick="updateLesson(12)">Disease</button>
    <a href="dashboard.html" style="color:white;display:block;margin-top:20px;text-align:center;">← Back to Dashboard</a>
</div>

<div class="viewer">
    <model-viewer id="mv"
        src="https://modelviewer.dev/shared-assets/models/WaterBottle.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        shadow-intensity="1">
        <button slot="ar-button"
            style="padding:10px 16px;border:none;border-radius:10px;background:#1b4332;color:white;font-weight:bold;">
            🌍 View in Your Room
        </button>
    </model-viewer>

    <div class="info">
        <h2 id="title">Waste Management</h2>
        <p id="desc">Click lessons to explore environmental awareness in AR.</p>
    </div>
</div>

<script>
const lessons = {
1: {
    t: "Earth",
    d: "🌍 Earth

Earth is our home 🏠💙. It gives us air 🌬️, water 💧, food 🍎, and a place to live.
What can we do?

Do not litter 🚯

Plant trees 🌳

Save water 💦

Switch off lights when not needed 💡
When we care for Earth, we protect all living things 🐶🐦🌼.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Planet%20(1).glb"
},
2: {
    t: "Air Pollution",
    d: "🌫️ Air Pollution

Air pollution makes the air dirty and unhealthy 🤧🌫️.
What can we do?

Ride a bicycle 🚲 instead of using a car for short distances

Walk to nearby places 🚶

Use public transport 🚌

Plant more trees 🌳
These small actions help keep the air fresh and clean 💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Campfire.glb"
},
3: {
    t: "Afforestation",
    d: "🌳 Afforestation

Afforestation means planting more trees 🌱🌳. Trees give us oxygen and shade 🌬️☀️.
What can we do?

Plant a tree on your birthday 🎂🌳

Water plants regularly 💧

Take care of small plants at home 🪴
More trees = healthier Earth 🌍💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Tree.glb"
},
4: {
    t: "Deforestation",
    d: "🪓 Deforestation

Cutting too many trees harms animals and makes Earth hotter 🐒🔥.
What can we do?

Use both sides of paper 📄

Avoid wasting notebooks 📚

Say no to unnecessary paper use 🙅
Saving paper means saving trees 🌲💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Dead%20Trees.glb"
},
5: {
    t: "Water Waste",
    d: "💧 Water Waste

Water is very precious 💙. Wasting water can cause shortages 🚱.
What can we do?

Turn off taps while brushing 🚰

Use a bucket instead of a shower 🪣

Do not play with water 💦
Saving water today helps tomorrow 🌈.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Waterfall.glb"
},
6: {
    t: "Transport",
    d: "🚌 Transport

Vehicles produce smoke that pollutes the air 🚗🌫️.
What can we do?

Use a bicycle 🚲 to go to school if nearby

Walk for short distances 🚶

Share a car (carpool) 🚘

Use buses or trains for long distances 🚆
Less smoke = cleaner air 🌬️💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Bike.glb"
},
7: {
    t: "Recycling Bin",
    d: "♻️ Recycling Bin

Recycling helps reduce waste and saves resources ♻️.
What can we do?

Put plastic bottles in recycling bins 🧴

Reuse old notebooks 📒

Turn old clothes into cleaning cloths 👕
Recycling gives old things a new life ✨.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Recycle%20bin.glb"
},
8: {
    t: "Wildlife Care",
    d: "🐾 Wildlife Care

Animals need clean forests and water to live 🐘🌳.
What can we do?

Do not throw plastic in parks 🚯

Feed birds grains and water in summer 🐦

Never harm animals 🐕
Protecting animals keeps nature balanced ⚖️💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Cow.glb"
},
9: {
    t: "Food Waste",
    d: "🍎 Food Waste

Wasting food wastes water, energy, and farmers’ hard work 👩‍🌾💧.
What can we do?

Take only what you can eat 🍽️

Finish your lunch 🥪

Share extra food 🤝
Saving food saves the planet 🌍💚.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/food.glb"
},
10: {
    t: "Dustbin",
    d: "🗑️ Dustbin

Throwing waste properly keeps places clean 🧹✨.
What can we do?

Always use a dustbin 🚮

Separate wet and dry waste 🗂️

Remind friends not to litter 😊
Clean surroundings keep us healthy 💪.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Trashcan.glb"
},
11: {
    t: "Factory Waste",
    d: "🏭 Factory Waste

Factories can cause pollution if waste is not managed properly 🌫️.
What can we do?

Save electricity at home 💡

Support eco-friendly products 🌿

Reduce plastic use 🛍️
When we make smart choices, factories also reduce pollution 🌍.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/trash.glb"
},
12: {
    t: "Disease",
    d: "🦠 Disease

Dirty surroundings can spread germs 🤒🦠.
What can we do?

Plant more and more trees

Keep your home and school clean 🏫

Do not litter 🚯
Clean environment = healthy people 💪🌈.",
    m: "https://raw.githubusercontent.com/ECOSPHERE-8/Raisoni/main/Human%20Immunodeficiency%20Virus.glb"
}
};

function updateLesson(id) {
    const lesson = lessons[id];
    document.getElementById('title').innerText = lesson.t;
    document.getElementById('desc').innerText = lesson.d;
    document.getElementById('mv').src = lesson.m;

    let progress = parseInt(localStorage.getItem('ecoProg')) || 0;
    localStorage.setItem('ecoProg', Math.min(progress + 5, 100));
}
</script>

</body>
</html>
